<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Assistant Viewer</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #22223a;
  --bg-card-alt: #2a2a45;
  --bg-input: #16162b;
  --border: #33335a;
  --text: #e0e0e8;
  --text-dim: #9999b8;
  --text-heading: #f0f0ff;
  --accent: #6c63ff;
  --accent-dim: #4a44b0;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --orange: #fb923c;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --radius: 8px;
}
.light {
  --bg: #f5f5f8;
  --bg-card: #ffffff;
  --bg-card-alt: #f0f0f5;
  --bg-input: #e8e8f0;
  --border: #d0d0dd;
  --text: #2a2a3a;
  --text-dim: #6a6a80;
  --text-heading: #1a1a2e;
  --accent: #5a52e0;
  --accent-dim: #7b75e8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Landing */
#landing {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 2rem;
}
#landing h1 { font-size: 2.4rem; color: var(--text-heading); margin-bottom: 0.5rem; }
#landing p { color: var(--text-dim); margin-bottom: 2rem; font-size: 1.1rem; }
.folder-btn {
  background: var(--accent); color: #fff; border: none; padding: 1rem 2.5rem;
  font-size: 1.1rem; border-radius: var(--radius); cursor: pointer;
  transition: background 0.2s;
}
.folder-btn:hover { background: var(--accent-dim); }

/* App shell */
#app { display: none; }
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border);
  background: var(--bg-card); position: sticky; top: 0; z-index: 100;
}
.top-bar .book-title { font-size: 1.2rem; font-weight: 600; color: var(--text-heading); }
.top-bar .book-author { color: var(--text-dim); margin-left: 0.5rem; font-size: 0.95rem; }
.top-bar-actions { display: flex; gap: 0.75rem; align-items: center; }
.toggle-btn {
  background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
  padding: 0.35rem 0.8rem; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem;
}
.toggle-btn:hover { border-color: var(--accent); }
.toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  background: var(--bg-card); padding: 0 1rem; overflow-x: auto;
}
.tab-btn {
  background: none; border: none; color: var(--text-dim); padding: 0.75rem 1.25rem;
  font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* Content */
.tab-content { display: none; padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
.tab-content.active { display: block; }

/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.25rem; margin-bottom: 1rem;
}
.card h3 { color: var(--text-heading); margin-bottom: 0.75rem; font-size: 1.1rem; }
.card h4 { color: var(--text-heading); margin-bottom: 0.5rem; font-size: 0.95rem; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-box {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem; text-align: center;
}
.stat-box .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
.stat-box .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; }

/* Verdict */
.verdict {
  display: inline-block; padding: 0.3rem 1rem; border-radius: var(--radius);
  font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
}
.verdict-pass { background: rgba(52,211,153,0.15); color: var(--green); }
.verdict-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
.verdict-fail { background: rgba(248,113,113,0.15); color: var(--red); }

/* Pipeline phase */
.phase-row {
  display: flex; align-items: center; padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
}
.phase-row:last-child { border-bottom: none; }
.phase-name { width: 180px; font-weight: 600; font-size: 0.9rem; }
.phase-status { width: 110px; }
.phase-detail { flex: 1; color: var(--text-dim); font-size: 0.85rem; font-family: var(--mono); }
.status-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  margin-right: 0.5rem; vertical-align: middle;
}
.status-completed { background: var(--green); }
.status-pending { background: var(--text-dim); }
.status-running { background: var(--yellow); }
.status-failed { background: var(--red); }

/* Expandable */
details { margin-bottom: 0.75rem; }
details > summary {
  cursor: pointer; padding: 0.75rem 1rem; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-weight: 600; color: var(--text-heading); list-style: none;
  display: flex; align-items: center; gap: 0.5rem;
}
details > summary::before { content: '\25B6'; font-size: 0.7rem; transition: transform 0.2s; }
details[open] > summary::before { transform: rotate(90deg); }
details > summary::-webkit-details-marker { display: none; }
details > .detail-body {
  padding: 1rem; border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius); background: var(--bg-card-alt);
}

/* Extraction cards */
.ext-card {
  background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem; margin-bottom: 0.75rem;
}
.ext-card .ext-category {
  display: inline-block; padding: 0.15rem 0.6rem; border-radius: 4px;
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem;
}
.cat-fact { background: rgba(96,165,250,0.15); color: var(--blue); }
.cat-quote { background: rgba(251,191,36,0.15); color: var(--yellow); }
.cat-example { background: rgba(52,211,153,0.15); color: var(--green); }
.cat-metaphor { background: rgba(251,146,60,0.15); color: var(--orange); }
.cat-glossary { background: rgba(108,99,255,0.15); color: var(--accent); }
.ext-text { font-family: var(--serif); line-height: 1.6; margin-bottom: 0.4rem; }
.ext-context { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }
.ext-meta { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.4rem; }
.bilingual { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.bilingual.stacked { grid-template-columns: 1fr; }

/* Filter bar */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center;
}
.filter-bar input {
  flex: 1; min-width: 200px; background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); padding: 0.5rem 0.75rem; border-radius: var(--radius); font-size: 0.9rem;
}
.filter-bar input::placeholder { color: var(--text-dim); }
.pill {
  background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
  padding: 0.35rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
}
.pill:hover { border-color: var(--accent); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Progress bar */
.progress-bar {
  height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; margin: 0.5rem 0;
}
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.progress-pass { background: var(--green); }
.progress-warn { background: var(--yellow); }
.progress-fail { background: var(--red); }

/* Key points */
.key-point {
  padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  font-family: var(--serif); line-height: 1.5;
}
.key-point:last-child { border-bottom: none; }

/* Review sections */
.review-section { margin-bottom: 1.25rem; }
.review-section h4 { margin-bottom: 0.5rem; }
.review-section p { font-family: var(--serif); line-height: 1.6; }
.evidence-list { margin-top: 0.5rem; padding-left: 1rem; }
.evidence-list li { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.3rem; }
.evidence-list li strong { color: var(--text); }

/* Cards tab (Obsidian) */
.obs-card-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
.obs-card-item {
  padding: 0.5rem 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; font-size: 0.9rem;
}
.obs-card-item:hover { border-color: var(--accent); }
.obs-card-item.active { border-color: var(--accent); background: var(--bg-card-alt); }
.obs-card-viewer {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.5rem; font-family: var(--serif); line-height: 1.7;
}
.obs-card-viewer h1, .obs-card-viewer h2, .obs-card-viewer h3 {
  font-family: var(--sans); color: var(--text-heading); margin: 1rem 0 0.5rem;
}
.obs-card-viewer h1 { font-size: 1.5rem; }
.obs-card-viewer h2 { font-size: 1.25rem; }
.obs-card-viewer h3 { font-size: 1.1rem; }
.obs-card-viewer p { margin-bottom: 0.75rem; }
.obs-card-viewer blockquote {
  border-left: 3px solid var(--accent); padding-left: 1rem; margin: 0.75rem 0;
  color: var(--text-dim); font-style: italic;
}
.obs-card-viewer ul, .obs-card-viewer ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
.obs-card-viewer li { margin-bottom: 0.3rem; }
.obs-card-viewer code {
  font-family: var(--mono); background: var(--bg-input); padding: 0.1rem 0.35rem;
  border-radius: 3px; font-size: 0.9em;
}
.obs-card-viewer .wikilink {
  color: var(--accent); cursor: pointer; text-decoration: underline;
  text-decoration-style: dotted;
}
.obs-card-viewer .wikilink:hover { text-decoration-style: solid; }
.obs-card-viewer .wikilink-broken { color: var(--text-dim); cursor: default; text-decoration: line-through; }
.obs-card-viewer .frontmatter {
  background: var(--bg-input); padding: 0.75rem 1rem; border-radius: var(--radius);
  font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim);
  margin-bottom: 1rem; white-space: pre-wrap;
}
.cards-layout { display: grid; grid-template-columns: 280px 1fr; gap: 1rem; }
.cards-search {
  background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
  padding: 0.5rem 0.75rem; border-radius: var(--radius); font-size: 0.85rem;
  width: 100%; margin-bottom: 0.75rem;
}
.cards-search::placeholder { color: var(--text-dim); }
@media (max-width: 768px) { .cards-layout { grid-template-columns: 1fr; } .bilingual { grid-template-columns: 1fr; } }

/* Lang badge */
.lang-badge {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 0.25rem;
}

/* Scrollable */
.scroll-list { max-height: 70vh; overflow-y: auto; padding-right: 0.5rem; }
.scroll-list::-webkit-scrollbar { width: 6px; }
.scroll-list::-webkit-scrollbar-track { background: transparent; }
.scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Empty state */
.empty-state { text-align: center; padding: 3rem; color: var(--text-dim); }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
th { color: var(--text-heading); font-weight: 600; }
</style>
</head>
<body>

<div id="landing">
  <h1>Reading Assistant Viewer</h1>
  <p>Open a processed book folder to explore summaries, extractions, reviews, and more.</p>
  <button class="folder-btn" onclick="pickFolder()">Open Book Folder</button>
</div>

<div id="app">
  <div class="top-bar">
    <div>
      <span class="book-title" id="bookTitle"></span>
      <span class="book-author" id="bookAuthor"></span>
    </div>
    <div class="top-bar-actions">
      <button class="toggle-btn" id="langToggle" onclick="toggleLang()">ZH</button>
      <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">Light</button>
      <button class="toggle-btn" onclick="pickFolder()">Open Another</button>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="summaries">Summaries</button>
    <button class="tab-btn" data-tab="extractions">Extractions</button>
    <button class="tab-btn" data-tab="reviews">Reviews</button>
    <button class="tab-btn" data-tab="qc">QC Report</button>
    <button class="tab-btn" data-tab="cards">Cards</button>
    <button class="tab-btn" data-tab="pipeline">Pipeline</button>
  </div>

  <div class="tab-content active" id="tab-overview"></div>
  <div class="tab-content" id="tab-summaries"></div>
  <div class="tab-content" id="tab-extractions"></div>
  <div class="tab-content" id="tab-reviews"></div>
  <div class="tab-content" id="tab-qc"></div>
  <div class="tab-content" id="tab-cards"></div>
  <div class="tab-content" id="tab-pipeline"></div>
</div>

<script>
// ── State ──
let DATA = {};
let lang = 'en';
let currentCardName = null;
let extFilter = 'all';
let extSearch = '';

// ── Helpers ──
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatNumber(n) {
  if (n == null) return '-';
  return Number(n).toLocaleString();
}

function verdictClass(v) {
  if (!v) return '';
  const vl = String(v).toLowerCase();
  if (vl === 'pass' || vl === 'completed') return 'verdict-pass';
  if (vl === 'warn') return 'verdict-warn';
  return 'verdict-fail';
}

function bilingualText(obj, enKey, zhKey) {
  if (!obj) return '';
  if (lang === 'zh') {
    const v = obj[zhKey || 'zh_cn'];
    if (v) return v;
  }
  return obj[enKey || 'en'] || '';
}

// ── Theme ──
function toggleTheme() {
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent =
    document.body.classList.contains('light') ? 'Dark' : 'Light';
}

// ── Language ──
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langToggle').textContent = lang === 'en' ? 'ZH' : 'EN';
  renderSummaries();
  renderExtractions();
  renderReviews();
}

// ── Folder Picker ──
function pickFolder() {
  const input = document.createElement('input');
  input.type = 'file';
  input.webkitdirectory = true;
  input.addEventListener('change', async (e) => {
    const files = {};
    for (const file of e.target.files) {
      const parts = file.webkitRelativePath.split('/');
      const relPath = parts.slice(1).join('/');
      files[relPath] = file;
    }
    await loadData(files);
  });
  input.click();
}

async function readJSON(files, path) {
  const file = files[path];
  if (!file) return null;
  try { return JSON.parse(await file.text()); }
  catch (e) { console.warn('Failed to parse', path, e); return null; }
}

async function readText(files, path) {
  const file = files[path];
  if (!file) return null;
  try { return await file.text(); }
  catch { return null; }
}

async function loadData(files) {
  const allPaths = Object.keys(files);
  DATA = {};

  // Core files
  DATA.metadata = await readJSON(files, 'metadata.json');
  DATA.pipeline = await readJSON(files, 'pipeline.json');

  // Chapters
  DATA.chapters = [];
  const chapterPaths = allPaths.filter(p => p.startsWith('chapters/') && p.endsWith('.json')).sort();
  for (const cp of chapterPaths) {
    const ch = await readJSON(files, cp);
    if (ch) DATA.chapters.push(ch);
  }

  // Summaries
  DATA.bookSummary = await readJSON(files, 'summaries/book_summary.json');
  DATA.summaryManifest = await readJSON(files, 'summaries/manifest.json');
  DATA.summaries = [];
  const summaryPaths = allPaths.filter(p => /^summaries\/summary_\d+\.json$/.test(p)).sort();
  for (const sp of summaryPaths) {
    const s = await readJSON(files, sp);
    if (s) DATA.summaries.push(s);
  }

  // Extractions
  DATA.extractionManifest = await readJSON(files, 'extractions/manifest.json');
  DATA.extractions = [];
  const extPaths = allPaths.filter(p => /^extractions\/extraction_\d+\.json$/.test(p)).sort();
  for (const ep of extPaths) {
    const ex = await readJSON(files, ep);
    if (ex) DATA.extractions.push(ex);
  }

  // Reviews
  DATA.rawReviews = await readJSON(files, 'reviews/raw_reviews.json');
  DATA.synthesizedReview = await readJSON(files, 'reviews/synthesized_review.json');

  // QC
  DATA.qcReport = await readJSON(files, 'qc/qc_report.json');

  // Cards (Obsidian .md files in cards/)
  DATA.cards = {};
  const cardPaths = allPaths.filter(p => p.startsWith('cards/') && p.endsWith('.md')).sort();
  for (const cp of cardPaths) {
    const name = cp.replace('cards/', '').replace(/\.md$/, '');
    DATA.cards[name] = await readText(files, cp);
  }

  // Reset filters
  extFilter = 'all';
  extSearch = '';
  currentCardName = null;

  // Show app
  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set header
  const meta = DATA.metadata || {};
  document.getElementById('bookTitle').textContent =
    meta.title || DATA.pipeline?.book || 'Unknown Book';
  document.getElementById('bookAuthor').textContent =
    meta.author ? 'by ' + meta.author : '';

  // Render all tabs
  renderOverview();
  renderSummaries();
  renderExtractions();
  renderReviews();
  renderQC();
  renderCards();
  renderPipeline();
}

// ── Tab switching ──
document.getElementById('tabBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});


// ═══════════════════════════════════════════════════════════
// TAB: Overview
// ═══════════════════════════════════════════════════════════
function renderOverview() {
  const meta = DATA.metadata || {};
  const pipe = DATA.pipeline || {};
  const qc = DATA.qcReport;
  const phases = pipe.phases || {};

  // Stats
  let statsHTML = '<div class="stat-grid">';
  statsHTML += statBox(meta.chapter_count, 'Chapters');
  statsHTML += statBox(meta.total_word_count, 'Words');
  if (phases.extract) statsHTML += statBox(phases.extract.total_items, 'Extractions');
  if (phases.cards) statsHTML += statBox(phases.cards.total_cards, 'Cards');
  if (phases.fetch_reviews) statsHTML += statBox(phases.fetch_reviews.total_reviews, 'Reviews');
  if (phases.chunk) statsHTML += statBox(phases.chunk.total_chunks, 'Chunks');
  statsHTML += '</div>';

  // Metadata table
  let metaHTML = '<div class="card"><h3>Book Metadata</h3><table>';
  const fields = ['title','author','language','genre','isbn','publisher','publication_date'];
  for (const f of fields) {
    if (meta[f]) metaHTML += '<tr><th>' + esc(f.replace(/_/g,' ')) + '</th><td>' + esc(String(meta[f])) + '</td></tr>';
  }
  if (meta.description) metaHTML += '<tr><th>description</th><td style="font-family:var(--serif)">' + esc(meta.description) + '</td></tr>';
  metaHTML += '</table></div>';

  // QC verdict
  let qcHTML = '';
  if (qc) {
    qcHTML = '<div class="card"><h3>Quality Check</h3>' +
      '<span class="verdict ' + verdictClass(qc.verdict) + '">' + esc(qc.verdict) + '</span>';
    if (qc.summary) {
      qcHTML += '<span style="margin-left:1rem;color:var(--text-dim);font-size:0.85rem">' +
        qc.summary.passed + ' passed, ' + qc.summary.warned + ' warned, ' +
        qc.summary.failed + ' failed</span>';
    }
    qcHTML += '</div>';
  }

  // Pipeline compact
  let pipeHTML = '<div class="card"><h3>Pipeline Status</h3>';
  for (const [name, info] of Object.entries(phases)) {
    const sc = 'status-' + (info.status || 'pending');
    pipeHTML += '<div class="phase-row">' +
      '<span class="phase-name"><span class="status-dot ' + sc + '"></span>' +
      esc(name.replace(/_/g,' ')) + '</span>' +
      '<span class="phase-status" style="font-size:0.85rem">' + esc(info.status || 'pending') + '</span>' +
      '<span class="phase-detail">' + esc(info.completed_at || '') + '</span></div>';
  }
  pipeHTML += '</div>';

  // Warnings
  let warnHTML = '';
  if (meta.warnings && meta.warnings.length) {
    warnHTML = '<div class="card"><h3>Warnings</h3>';
    for (const w of meta.warnings) {
      warnHTML += '<p style="color:var(--yellow);font-size:0.9rem;margin-bottom:0.3rem">&#9888; ' +
        esc(typeof w === 'string' ? w : JSON.stringify(w)) + '</p>';
    }
    warnHTML += '</div>';
  }

  document.getElementById('tab-overview').innerHTML = statsHTML + metaHTML + qcHTML + pipeHTML + warnHTML;
}

function statBox(value, label) {
  return '<div class="stat-box"><div class="stat-value">' +
    formatNumber(value) + '</div><div class="stat-label">' + esc(label) + '</div></div>';
}


// ═══════════════════════════════════════════════════════════
// TAB: Summaries
// ═══════════════════════════════════════════════════════════
function renderSummaries() {
  let html = '';

  // Book summary
  const bs = DATA.bookSummary;
  if (bs) {
    const text = lang === 'zh' ? (bs.summary_zh_cn || bs.summary_en || '') : (bs.summary_en || '');
    html += '<div class="card"><h3>' + esc(bs.title || 'Book Summary') + '</h3>' +
      '<p style="font-family:var(--serif);line-height:1.7">' + esc(text) + '</p>';
    if (bs.key_themes && bs.key_themes.length) {
      html += '<h4 style="margin-top:1rem">Key Themes</h4>';
      for (const theme of bs.key_themes) {
        html += '<div class="key-point">' +
          esc(lang === 'zh' ? (theme.zh_cn || theme.en || '') : (theme.en || '')) + '</div>';
      }
    }
    html += '</div>';
  }

  // Manifest info
  const sm = DATA.summaryManifest;
  if (sm) {
    html += '<div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:1rem">' +
      sm.chapters_summarized + ' chapters summarized';
    if (sm.chapters_skipped && sm.chapters_skipped.length) {
      html += ', ' + sm.chapters_skipped.length + ' skipped';
    }
    html += '</div>';
  }

  // Per-chapter summaries
  const summaries = (DATA.summaries || []).slice().sort((a,b) => a.chapter_index - b.chapter_index);
  for (const s of summaries) {
    const text = lang === 'zh' ? (s.summary_zh_cn || s.summary_en || '') : (s.summary_en || '');
    html += '<details><summary>Ch ' + s.chapter_index + ': ' + esc(s.chapter_title) +
      '</summary><div class="detail-body">' +
      '<p style="font-family:var(--serif);line-height:1.7">' + esc(text) + '</p>';
    if (s.key_points && s.key_points.length) {
      html += '<h4 style="margin-top:1rem">Key Points</h4>';
      for (const kp of s.key_points) {
        html += '<div class="key-point">' +
          esc(lang === 'zh' ? (kp.zh_cn || kp.en || '') : (kp.en || '')) + '</div>';
      }
    }
    html += '</div></details>';
  }

  if (!bs && summaries.length === 0) {
    html = '<div class="empty-state">No summaries available.</div>';
  }

  document.getElementById('tab-summaries').innerHTML = html;
}


// ═══════════════════════════════════════════════════════════
// TAB: Extractions
// ═══════════════════════════════════════════════════════════
function getAllExtractionItems() {
  const items = [];
  for (const ex of (DATA.extractions || [])) {
    if (ex.items) {
      for (const item of ex.items) items.push(item);
    }
  }
  return items;
}

function renderExtractions() {
  const allItems = getAllExtractionItems();

  // Category counts
  const catCounts = {};
  for (const item of allItems) {
    const c = item.category || 'unknown';
    catCounts[c] = (catCounts[c] || 0) + 1;
  }

  // Filter bar
  const categories = ['all','fact','quote','example','metaphor','glossary'];
  let html = '<div class="filter-bar">' +
    '<input type="text" placeholder="Search extractions..." id="extSearchInput" value="' +
    escAttr(extSearch) + '">';
  for (const cat of categories) {
    const count = cat === 'all' ? allItems.length : (catCounts[cat] || 0);
    const active = extFilter === cat ? ' active' : '';
    html += '<span class="pill' + active + '" data-cat="' + cat + '">' +
      cat + ' (' + count + ')</span>';
  }
  html += '</div><div id="extCardsContainer"></div>';

  document.getElementById('tab-extractions').innerHTML = html;

  // Bind search
  document.getElementById('extSearchInput').addEventListener('input', function() {
    extSearch = this.value;
    renderExtCards();
  });

  // Bind pills
  document.querySelectorAll('#tab-extractions .pill').forEach(pill => {
    pill.addEventListener('click', function() {
      extFilter = this.dataset.cat;
      renderExtractions();
    });
  });

  renderExtCards();
}

function renderExtCards() {
  let filtered = getAllExtractionItems();

  if (extFilter !== 'all') {
    filtered = filtered.filter(i => i.category === extFilter);
  }
  if (extSearch) {
    const q = extSearch.toLowerCase();
    filtered = filtered.filter(i =>
      (i.text || '').toLowerCase().includes(q) ||
      (i.text_zh || '').toLowerCase().includes(q) ||
      (i.context || '').toLowerCase().includes(q) ||
      (i.context_zh || '').toLowerCase().includes(q) ||
      (i.term || '').toLowerCase().includes(q) ||
      (i.definition || '').toLowerCase().includes(q) ||
      (i.chapter_title || '').toLowerCase().includes(q)
    );
  }

  let html = '<div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:0.75rem">' +
    filtered.length + ' items</div>';

  const pageSize = 100;
  const display = filtered.slice(0, pageSize);

  for (const item of display) {
    const catClass = 'cat-' + (item.category || 'fact');
    html += '<div class="ext-card">' +
      '<span class="ext-category ' + catClass + '">' + esc(item.category || 'unknown') + '</span>';

    // Chapter ref
    if (item.chapter_title != null) {
      html += '<span style="float:right;font-size:0.75rem;color:var(--text-dim)">' +
        'Ch ' + item.chapter_index + ': ' + esc(item.chapter_title) + '</span>';
    }

    // Main text — bilingual side by side
    html += '<div class="bilingual" style="margin-top:0.5rem">' +
      '<div><div class="lang-badge">EN</div><div class="ext-text">' + esc(item.text) + '</div></div>';
    if (item.text_zh) {
      html += '<div><div class="lang-badge">ZH</div><div class="ext-text">' + esc(item.text_zh) + '</div></div>';
    }
    html += '</div>';

    // Context
    if (item.context || item.context_zh) {
      html += '<div class="bilingual" style="margin-top:0.5rem">';
      if (item.context) html += '<div class="ext-context">' + esc(item.context) + '</div>';
      if (item.context_zh) html += '<div class="ext-context">' + esc(item.context_zh) + '</div>';
      html += '</div>';
    }

    // Category-specific extra fields
    const extras = [];
    if (item.speaker) extras.push('Speaker: ' + esc(item.speaker));
    if (item.source_domain) extras.push('Source: ' + esc(item.source_domain));
    if (item.target_domain) extras.push('Target: ' + esc(item.target_domain));
    if (item.term) extras.push('Term: ' + esc(item.term));
    if (item.definition) extras.push('Definition: ' + esc(item.definition));
    if (item.related_terms && item.related_terms.length) extras.push('Related: ' + item.related_terms.map(esc).join(', '));
    if (item.illustrates) extras.push('Illustrates: ' + esc(item.illustrates));
    if (item.confidence != null) extras.push('Confidence: ' + (item.confidence * 100).toFixed(0) + '%');
    if (extras.length) {
      html += '<div class="ext-meta">' + extras.join(' &middot; ') + '</div>';
    }

    html += '</div>';
  }

  if (filtered.length > pageSize) {
    html += '<div style="text-align:center;color:var(--text-dim);padding:1rem">' +
      'Showing first ' + pageSize + ' of ' + filtered.length + ' items</div>';
  }

  if (filtered.length === 0) {
    html += '<div class="empty-state">No matching extractions.</div>';
  }

  document.getElementById('extCardsContainer').innerHTML = html;
}


// ═══════════════════════════════════════════════════════════
// TAB: Reviews
// ═══════════════════════════════════════════════════════════
function renderReviews() {
  let html = '';
  const syn = DATA.synthesizedReview;

  if (syn) {
    // Overall reception
    if (syn.overall_reception) {
      const text = bilingualText(syn.overall_reception, 'en', 'zh_cn');
      html += '<div class="card review-section"><h3>Overall Reception</h3>' +
        '<p>' + esc(text) + '</p></div>';
    }

    // Metadata
    if (syn.synthesis_metadata) {
      const sm = syn.synthesis_metadata;
      html += '<div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:1rem">' +
        'Based on ' + sm.source_count + ' sources';
      if (sm.source_breakdown) {
        const parts = Object.entries(sm.source_breakdown)
          .map(([k,v]) => v + ' ' + k.replace(/_/g,' '));
        html += ' (' + parts.join(', ') + ')';
      }
      html += '</div>';
    }

    // Strengths
    if (syn.strengths && syn.strengths.length) {
      html += '<div class="card review-section"><h3>Strengths</h3>';
      for (const s of syn.strengths) {
        html += '<div class="key-point" style="color:var(--green)">' +
          esc(bilingualText(s, 'en', 'zh_cn')) + '</div>';
      }
      html += '</div>';
    }

    // Criticisms
    if (syn.criticisms && syn.criticisms.length) {
      html += '<div class="card review-section"><h3>Criticisms</h3>';
      for (const c of syn.criticisms) {
        html += '<div class="key-point" style="color:var(--red)">' +
          esc(bilingualText(c, 'en', 'zh_cn')) + '</div>';
      }
      html += '</div>';
    }

    // Common themes
    if (syn.common_themes && syn.common_themes.length) {
      html += '<div class="card review-section"><h3>Common Themes</h3>';
      for (const theme of syn.common_themes) {
        const themeText = theme.theme ? bilingualText(theme.theme, 'en', 'zh_cn') : '';
        html += '<details><summary>' + esc(themeText) + '</summary><div class="detail-body">';
        if (theme.evidence && theme.evidence.length) {
          html += '<ul class="evidence-list">';
          for (const ev of theme.evidence) {
            html += '<li><strong>' + esc(ev.source) + '</strong>: ' + esc(ev.text) + '</li>';
          }
          html += '</ul>';
        }
        html += '</div></details>';
      }
      html += '</div>';
    }

    // Points of agreement
    if (syn.points_of_agreement && syn.points_of_agreement.length) {
      html += '<div class="card review-section"><h3>Points of Agreement</h3>';
      for (const p of syn.points_of_agreement) {
        const text = p.point ? bilingualText(p.point, 'en', 'zh_cn') : '';
        html += '<div class="key-point">' + esc(text);
        if (p.sources && p.sources.length) {
          html += ' <span style="color:var(--text-dim);font-size:0.8rem">(' +
            p.sources.map(esc).join(', ') + ')</span>';
        }
        html += '</div>';
      }
      html += '</div>';
    }

    // Points of disagreement
    if (syn.points_of_disagreement && syn.points_of_disagreement.length) {
      html += '<div class="card review-section"><h3>Points of Disagreement</h3>';
      for (const p of syn.points_of_disagreement) {
        const text = p.point ? bilingualText(p.point, 'en', 'zh_cn') : '';
        html += '<details><summary>' + esc(text) + '</summary><div class="detail-body">';
        if (p.perspectives && p.perspectives.length) {
          html += '<ul class="evidence-list">';
          for (const persp of p.perspectives) {
            html += '<li><strong>' + esc(persp.source) + '</strong>: ' + esc(persp.position) + '</li>';
          }
          html += '</ul>';
        }
        html += '</div></details>';
      }
      html += '</div>';
    }

    // Notable perspectives
    if (syn.notable_perspectives && syn.notable_perspectives.length) {
      html += '<div class="card review-section"><h3>Notable Perspectives</h3>';
      for (const np of syn.notable_perspectives) {
        const text = np.perspective ? bilingualText(np.perspective, 'en', 'zh_cn') : '';
        html += '<div class="key-point"><strong>' + esc(np.source) + '</strong>: ' + esc(text) + '</div>';
      }
      html += '</div>';
    }

    // Recommended for
    if (syn.recommended_for) {
      const text = bilingualText(syn.recommended_for, 'en', 'zh_cn');
      html += '<div class="card review-section"><h3>Recommended For</h3><p>' + esc(text) + '</p></div>';
    }
  }

  // Raw reviews
  const raw = DATA.rawReviews;
  if (raw && raw.sources) {
    html += '<div class="card"><h3>Raw Review Sources</h3>';
    for (const src of raw.sources) {
      const reviewCount = src.reviews ? src.reviews.length : 0;
      const statusColor = src.status === 'ok' ? 'var(--green)'
        : src.status === 'skipped' ? 'var(--text-dim)' : 'var(--yellow)';

      html += '<details><summary>' +
        '<span style="color:' + statusColor + '">' + esc(src.source) + '</span>' +
        '<span style="color:var(--text-dim);font-size:0.8rem;margin-left:auto">' +
        esc(src.status) + ' &middot; ' + reviewCount + ' reviews</span>' +
        '</summary><div class="detail-body">';

      if (src.error_message) {
        html += '<p style="color:var(--yellow);font-size:0.85rem">' + esc(src.error_message) + '</p>';
      }
      if (src.book_info) {
        const bi = src.book_info;
        if (bi.ratings_average != null) {
          html += '<p style="font-size:0.85rem;color:var(--text-dim)">Rating: ' +
            bi.ratings_average + ' (' + bi.ratings_count + ' ratings)</p>';
        }
      }
      if (src.reviews && src.reviews.length) {
        for (const r of src.reviews) {
          html += '<div style="padding:0.75rem 0;border-bottom:1px solid var(--border)">' +
            '<div style="font-size:0.85rem;color:var(--text-dim)">' +
            esc(r.reviewer || 'Anonymous') +
            (r.rating ? ' &middot; ' + r.rating + '/5' : '') +
            (r.date ? ' &middot; ' + r.date : '') + '</div>' +
            '<p style="font-family:var(--serif);font-size:0.9rem;margin-top:0.3rem;line-height:1.5">' +
            esc(r.text) + '</p></div>';
        }
      } else if (!src.error_message) {
        html += '<p style="color:var(--text-dim);font-size:0.85rem">No reviews from this source.</p>';
      }
      html += '</div></details>';
    }
    html += '</div>';
  }

  if (!syn && !raw) {
    html = '<div class="empty-state">No reviews available.</div>';
  }

  document.getElementById('tab-reviews').innerHTML = html;
}


// ═══════════════════════════════════════════════════════════
// TAB: QC Report
// ═══════════════════════════════════════════════════════════
function renderQC() {
  const qc = DATA.qcReport;
  if (!qc) {
    document.getElementById('tab-qc').innerHTML = '<div class="empty-state">No QC report available.</div>';
    return;
  }

  let html = '<div style="text-align:center;margin-bottom:1.5rem">' +
    '<div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:0.5rem">' +
    esc(qc.book || '') + '</div>' +
    '<span class="verdict ' + verdictClass(qc.verdict) +
    '" style="font-size:1.2rem;padding:0.5rem 2rem">' + esc(qc.verdict) + '</span>';
  if (qc.summary) {
    html += '<div style="margin-top:0.75rem;color:var(--text-dim);font-size:0.9rem">' +
      qc.summary.total_checks + ' checks: ' +
      qc.summary.passed + ' passed, ' +
      qc.summary.warned + ' warned, ' +
      qc.summary.failed + ' failed</div>';
  }
  html += '</div>';

  // Sub-agent results
  const results = qc.sub_agent_results || {};
  for (const [checkName, check] of Object.entries(results)) {
    html += '<div class="card">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">' +
      '<h3 style="margin:0">' + esc(checkName.replace(/_/g,' ')) + '</h3>' +
      '<span class="verdict ' + verdictClass(check.verdict) + '">' + esc(check.verdict) + '</span></div>';

    // Rate and progress bar
    const rate = check.pass_rate ?? check.accuracy_rate ?? check.average_coverage ?? check.fidelity_rate;
    if (rate != null) {
      const pct = (rate * 100).toFixed(1);
      const barClass = check.verdict === 'PASS' ? 'progress-pass'
        : check.verdict === 'WARN' ? 'progress-warn' : 'progress-fail';
      html += '<div style="font-size:0.9rem;margin-bottom:0.25rem">' + pct + '%</div>' +
        '<div class="progress-bar"><div class="progress-fill ' + barClass +
        '" style="width:' + pct + '%"></div></div>';
    }

    // Stats
    const stats = [];
    if (check.total != null) stats.push('Total: ' + check.total);
    if (check.passed != null) stats.push('Passed: ' + check.passed);
    if (check.failed != null) stats.push('Failed: ' + check.failed);
    if (check.correct != null) stats.push('Correct: ' + check.correct);
    if (check.total_chapters != null) stats.push('Chapters: ' + check.total_chapters);
    if (check.total_claims != null) stats.push('Claims: ' + check.total_claims);
    if (check.verified != null) stats.push('Verified: ' + check.verified);
    if (stats.length) {
      html += '<div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.5rem">' +
        stats.join(' &middot; ') + '</div>';
    }

    // Threshold
    if (check.threshold) {
      html += '<div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem;font-family:var(--mono)">' +
        'Thresholds: PASS ' + esc(check.threshold.pass) +
        ', WARN ' + esc(check.threshold.warn) +
        ', FAIL ' + esc(check.threshold.fail) + '</div>';
    }

    // Failed items
    if (check.failed_items && check.failed_items.length) {
      html += '<h4 style="margin-top:1rem;color:var(--red)">Failed Items</h4>';
      for (const fi of check.failed_items) {
        html += '<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem">';
        if (fi.quote_text) {
          html += '<div style="font-family:var(--serif)">&ldquo;' + esc(fi.quote_text) + '&rdquo;</div>';
        }
        const fiMeta = [];
        if (fi.chapter_title) fiMeta.push(fi.chapter_title);
        if (fi.match_score != null) fiMeta.push('Match: ' + (fi.match_score * 100).toFixed(0) + '%');
        if (fi.status) fiMeta.push(fi.status);
        if (fiMeta.length) {
          html += '<div style="color:var(--text-dim);font-size:0.8rem;margin-top:0.2rem">' +
            fiMeta.map(esc).join(' &middot; ') + '</div>';
        }
        html += '</div>';
      }
    }

    // Chapter results (summary_coverage)
    if (check.results && check.results.length) {
      html += '<h4 style="margin-top:1rem">Per-Chapter Coverage</h4>';
      for (const r of check.results) {
        const rpct = r.coverage_score != null ? (r.coverage_score * 100).toFixed(0) : '0';
        const rClass = r.verdict === 'PASS' ? 'progress-pass'
          : r.verdict === 'WARN' ? 'progress-warn' : 'progress-fail';
        html += '<div style="display:flex;align-items:center;gap:0.75rem;padding:0.3rem 0;font-size:0.85rem">' +
          '<span style="width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
          esc(r.chapter_title) + '</span>' +
          '<div class="progress-bar" style="flex:1"><div class="progress-fill ' + rClass +
          '" style="width:' + rpct + '%"></div></div>' +
          '<span style="width:50px;text-align:right;font-family:var(--mono)">' + rpct + '%</span>' +
          '<span class="verdict ' + verdictClass(r.verdict) +
          '" style="font-size:0.7rem;padding:0.1rem 0.4rem">' + esc(r.verdict) + '</span></div>';
      }
    }

    html += '</div>';
  }

  document.getElementById('tab-qc').innerHTML = html;
}


// ═══════════════════════════════════════════════════════════
// TAB: Cards (Obsidian .md)
// ═══════════════════════════════════════════════════════════
function renderCards() {
  const cardNames = Object.keys(DATA.cards || {});
  if (cardNames.length === 0) {
    document.getElementById('tab-cards').innerHTML = '<div class="empty-state">No cards found.</div>';
    return;
  }

  let listHTML = '<input type="text" class="cards-search" placeholder="Filter cards..." ' +
    'oninput="filterCards(this.value)">' +
    '<div class="obs-card-list scroll-list" id="cardList">';
  for (const name of cardNames) {
    listHTML += '<div class="obs-card-item" data-card="' + escAttr(name) +
      '" onclick="showCard(this.dataset.card)">' + esc(name) + '</div>';
  }
  listHTML += '</div>';

  const html = '<div class="cards-layout">' +
    '<div>' + listHTML + '</div>' +
    '<div class="obs-card-viewer scroll-list" id="cardViewer">' +
    '<div class="empty-state">Select a card from the list</div></div></div>';

  document.getElementById('tab-cards').innerHTML = html;
}

function filterCards(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.obs-card-item').forEach(el => {
    const name = el.dataset.card.toLowerCase();
    el.style.display = name.includes(q) ? '' : 'none';
  });
}

function showCard(name) {
  currentCardName = name;

  // Highlight in list
  document.querySelectorAll('.obs-card-item').forEach(el => {
    el.classList.toggle('active', el.dataset.card === name);
  });

  const raw = DATA.cards[name];
  if (!raw) {
    document.getElementById('cardViewer').innerHTML = '<div class="empty-state">Card not found.</div>';
    return;
  }

  document.getElementById('cardViewer').innerHTML = renderMarkdown(raw);

  // Bind wikilink clicks
  document.querySelectorAll('#cardViewer .wikilink').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.card;
      if (DATA.cards && DATA.cards[target]) {
        showCard(target);
        // Scroll list item into view
        const listItem = document.querySelector('.obs-card-item[data-card="' + CSS.escape(target) + '"]');
        if (listItem) listItem.scrollIntoView({ block: 'nearest' });
      }
    });
  });
}

function renderMarkdown(md) {
  let html = '';
  let body = md;

  // Extract YAML frontmatter
  const fmMatch = md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
  if (fmMatch) {
    html += '<div class="frontmatter">' + esc(fmMatch[1]) + '</div>';
    body = fmMatch[2];
  }

  // Pre-process: collect wikilinks and replace with placeholders
  let wikilinkCounter = 0;
  const wikilinkMap = {};
  body = body.replace(/\[\[([^\]|]+?)(?:\|([^\]]+?))?\]\]/g, (_, target, display) => {
    const cardName = target.trim();
    const label = display ? display.trim() : cardName;
    const id = '%%WL' + (wikilinkCounter++) + '%%';
    wikilinkMap[id] = { cardName, label };
    return id;
  });

  // Render markdown line by line
  const lines = body.split('\n');
  let inList = false;
  let listType = '';
  let inBlockquote = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      closeLists();
      const level = hMatch[1].length;
      html += '<h' + level + '>' + inlineFmt(hMatch[2]) + '</h' + level + '>';
      continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      closeLists();
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += inlineFmt(line.slice(2)) + '<br>';
      continue;
    } else if (inBlockquote) {
      html += '</blockquote>';
      inBlockquote = false;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)[-*]\s+(.+)$/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') {
        if (inList) html += '</' + listType + '>';
        html += '<ul>'; inList = true; listType = 'ul';
      }
      html += '<li>' + inlineFmt(ulMatch[2]) + '</li>';
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
    if (olMatch) {
      if (!inList || listType !== 'ol') {
        if (inList) html += '</' + listType + '>';
        html += '<ol>'; inList = true; listType = 'ol';
      }
      html += '<li>' + inlineFmt(olMatch[2]) + '</li>';
      continue;
    }

    // Close list
    closeLists();

    // Horizontal rule
    if (/^---+$/.test(line.trim())) {
      html += '<hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">';
      continue;
    }

    // Empty line
    if (line.trim() === '') continue;

    // Paragraph
    html += '<p>' + inlineFmt(line) + '</p>';
  }

  closeLists();
  if (inBlockquote) html += '</blockquote>';

  // Restore wikilinks
  for (const [id, info] of Object.entries(wikilinkMap)) {
    const exists = DATA.cards && DATA.cards[info.cardName];
    const cls = exists ? 'wikilink' : 'wikilink wikilink-broken';
    const replacement = '<span class="' + cls + '" data-card="' + escAttr(info.cardName) + '">' +
      esc(info.label) + '</span>';
    html = html.split(id).join(replacement);
  }

  return html;

  function closeLists() {
    if (inList) { html += '</' + listType + '>'; inList = false; }
  }
}

function inlineFmt(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Inline code
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  return text;
}


// ═══════════════════════════════════════════════════════════
// TAB: Pipeline
// ═══════════════════════════════════════════════════════════
function renderPipeline() {
  const pipe = DATA.pipeline;
  if (!pipe) {
    document.getElementById('tab-pipeline').innerHTML = '<div class="empty-state">No pipeline data available.</div>';
    return;
  }

  let html = '<div class="card"><h3>Pipeline Information</h3><table>' +
    '<tr><th>Book</th><td>' + esc(pipe.book) + '</td></tr>';
  if (pipe.slug) html += '<tr><th>Slug</th><td style="font-family:var(--mono)">' + esc(pipe.slug) + '</td></tr>';
  if (pipe.target_language) html += '<tr><th>Target Language</th><td>' + esc(pipe.target_language) + '</td></tr>';
  if (pipe.epub_path) html += '<tr><th>EPUB Path</th><td style="font-family:var(--mono);font-size:0.8rem;word-break:break-all">' + esc(pipe.epub_path) + '</td></tr>';
  if (pipe.created_at) html += '<tr><th>Created</th><td>' + esc(pipe.created_at) + '</td></tr>';
  html += '</table></div>';

  // Phase timeline
  const phases = pipe.phases || {};
  html += '<div class="card"><h3>Phase Timeline</h3>';

  for (const [name, info] of Object.entries(phases)) {
    const sc = 'status-' + (info.status || 'pending');
    const vc = info.status === 'completed' ? 'PASS' : info.status === 'failed' ? 'FAIL' : 'WARN';

    html += '<div class="phase-row">' +
      '<span class="phase-name"><span class="status-dot ' + sc + '"></span>' +
      esc(name.replace(/_/g,' ')) + '</span>' +
      '<span class="phase-status"><span class="verdict ' + verdictClass(vc) +
      '" style="font-size:0.7rem;padding:0.1rem 0.4rem">' + esc(info.status || 'pending') + '</span></span>' +
      '<span class="phase-detail">';

    // Phase-specific details
    const details = [];
    if (info.completed_at) details.push(info.completed_at);
    if (info.total_reviews != null) details.push(info.total_reviews + ' reviews');
    if (info.total_chunks != null) details.push(info.total_chunks + ' chunks');
    if (info.chapters_summarized != null) details.push(info.chapters_summarized + ' chapters');
    if (info.total_items != null) details.push(info.total_items + ' items');
    if (info.reviews_analyzed != null) details.push(info.reviews_analyzed + ' analyzed');
    if (info.total_cards != null) details.push(info.total_cards + ' cards');
    if (info.total_records != null) details.push(info.total_records + ' records');
    if (info.db_size_mb != null) details.push(info.db_size_mb + ' MB');
    if (info.qc_verdict) details.push('verdict: ' + info.qc_verdict);
    html += details.join(' &middot; ');

    html += '</span></div>';

    // QC sub-checks
    if (info.checks) {
      for (const [ck, cv] of Object.entries(info.checks)) {
        html += '<div class="phase-row" style="padding-left:2rem">' +
          '<span class="phase-name" style="font-weight:400;font-size:0.85rem">' +
          esc(ck.replace(/_/g,' ')) + '</span>' +
          '<span class="phase-status"><span class="verdict ' + verdictClass(cv) +
          '" style="font-size:0.65rem;padding:0.1rem 0.3rem">' + esc(cv) + '</span></span>' +
          '<span class="phase-detail"></span></div>';
      }
    }
  }

  html += '</div>';

  document.getElementById('tab-pipeline').innerHTML = html;
}
</script>
